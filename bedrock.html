<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2a6a20" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="12 Clocks: Bedrock Edition" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>12 Clocks: Bedrock Edition</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
      #gameCanvas { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
      }
      #ui .screen {
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        pointer-events: all;
      }
      #ui button {
        cursor: pointer; border: none; outline: none;
        font-family: Arial Black, Arial, sans-serif;
        font-weight: bold; border-radius: 40px;
        padding: 18px 40px; font-size: 22px;
        transition: transform 0.1s;
      }
      #ui button:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
