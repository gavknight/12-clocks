<svg xmlns="http://www.w3.org/2000/svg" width="36" height="40" viewBox="0 0 36 40">
  <!-- Pointing finger -->
  <rect x="13" y="2" width="7" height="16" rx="3.5" fill="white" stroke="#222" stroke-width="2"/>
  <!-- Middle finger (tucked) -->
  <rect x="20" y="10" width="6" height="12" rx="3" fill="white" stroke="#222" stroke-width="2"/>
  <!-- Ring finger (tucked) -->
  <rect x="26" y="11" width="5.5" height="11" rx="2.8" fill="white" stroke="#222" stroke-width="2"/>
  <!-- Pinky (tucked) -->
  <rect x="31" y="13" width="4" height="9" rx="2" fill="white" stroke="#222" stroke-width="2"/>
  <!-- Thumb -->
  <rect x="5" y="14" width="5" height="10" rx="2.5" fill="white" stroke="#222" stroke-width="2"/>
  <!-- Palm -->
  <rect x="5" y="17" width="30" height="18" rx="5" fill="white" stroke="#222" stroke-width="2"/>
</svg>
